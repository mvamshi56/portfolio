name: Add Article

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Article title'
        required: true
        type: string
      url:
        description: 'LinkedIn post URL'
        required: true
        type: string
      description:
        description: 'Short excerpt (1-2 sentences)'
        required: true
        type: string
      date:
        description: 'Month and year (e.g. Mar 2026)'
        required: true
        type: string
      readTime:
        description: 'Read time (e.g. 3 min read)'
        required: false
        default: '3 min read'
        type: string

jobs:
  add-article:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add article to articles.json
        shell: node {0}
        run: |
          const fs = require('fs');
          const file = 'articles.json';
          const articles = JSON.parse(fs.readFileSync(file, 'utf8'));
          articles.unshift({
            title: process.env.INPUT_TITLE,
            url: process.env.INPUT_URL,
            description: process.env.INPUT_DESCRIPTION,
            date: process.env.INPUT_DATE,
            readTime: process.env.INPUT_READTIME
          });
          fs.writeFileSync(file, JSON.stringify(articles, null, 2) + '\n');

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Add article: ${{ inputs.title }}'
          commit_user_name: 'Article Bot'
          commit_user_email: 'actions@github.com'
