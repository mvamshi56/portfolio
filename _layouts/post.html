---
layout: default
---

<article class="blog-post">
    <header class="blog-post-header">
        <span class="section-tag">{{ page.date | date: "%b %Y" }} · {{ page.readTime | default: "3 min read" }}</span>
        <h1 class="blog-post-title">{{ page.title }}</h1>
    </header>
    <div class="blog-post-content">
        {{ content }}
    </div>
    <a href="{{ site.baseurl }}/blog/" class="blog-back">&larr; Back to Blog</a>
</article>

<style>
.blog-post { max-width: 720px; margin: 0 auto; }
.blog-post-header { margin-bottom: 40px; }
.blog-post-title { font-family: var(--font-display); font-size: 2rem; line-height: 1.3; margin-top: 12px; }
.blog-post-content { font-size: 1.05rem; line-height: 1.8; color: var(--text-primary); }
.blog-post-content p { margin-bottom: 20px; }
.blog-post-content strong { color: var(--accent-primary); }
.blog-post-content ul, .blog-post-content ol { margin-bottom: 20px; padding-left: 24px; }
.blog-post-content li { margin-bottom: 8px; }
.blog-back { display: inline-flex; align-items: center; gap: 4px; margin-top: 40px; color: var(--accent-primary); text-decoration: none; font-weight: 600; }
.blog-back:hover { gap: 8px; }
</style>
