<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>

    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/assets/favicon.ico">

    <link rel="apple-touch-icon" sizes="180x180" href="{{ site.baseurl }}/assets/favicon-180.png">
    <title>{{ page.title }} | Vamshidhar Reddy M</title>
    <meta name="description" content="{{ page.description | default: 'Blog on AI marketing, SEO, and digital strategy' }}">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">

    <meta property="og:description" content="{{ page.description | default: 'Blog post' }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ site.baseurl }}/style.css?v=1.1">

                    <svg viewBox="0 0 100 100" class="diamond-svg">
                        <defs>
                            <linearGradient id="facTop" x1="0%" y1="0%" x2="0%" y2="100%">

                        <polygon points="50,3 66,22 50,30 34,22" fill="white" opacity="0.5"/>
                        <polygon points="42,14 54,14 50,22 46,22" fill="white" opacity="0.7"/>
                        <text x="50" y="59" text-anchor="middle" fill="white"
                              font-family="'Space Grotesk', sans-serif" font-weight="800"
                              font-size="22" letter-spacing="-0.5">MVR</text>
                    </svg>
                </div>
                <div class="logo-text-wrap">
                    <span class="logo-name">Vamshidhar Reddy</span>

                <li><a href="{{ site.baseurl }}/blog/" class="nav-link">Blog</a></li>
                <li><a href="{{ site.baseurl }}/#contact" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>

                                    <linearGradient id="fTopF" x1="0%" y1="0%" x2="0%" y2="100%">

            <div class="footer-bottom">

                    <a href="mailto:digitalVamshidhar@gmail.com"><i class="fas fa-envelope"></i></a>
