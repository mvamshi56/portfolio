    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" media="print" onload="this.media='all'">

    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
    <style>
        .blog-page { padding-top: calc(var(--navbar-height) + 40px); padding-bottom: 80px; }
        .blog-header { text-align: center; margin-bottom: 48px; }
        .blog-header h1 { font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 12px; }
        .blog-header p { color: var(--text-secondary); font-size: 1.1rem; max-width: 500px; margin: 0 auto; }
        .blog-listing { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }
        .blog-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-xl); padding: 28px; transition: all var(--transition-fast); cursor: pointer; }
        .blog-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-xl); border-color: var(--accent-primary); }
        .blog-card-meta { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; display: flex; gap: 12px; }
        .blog-card h2 { font-family: var(--font-display); font-size: 1.2rem; margin-bottom: 10px; color: var(--text-primary); }
        .blog-card p { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; margin: 0; }
        .blog-card .read-more { color: var(--accent-primary); font-size: 0.85rem; font-weight: 600; margin-top: 14px; display: inline-flex; align-items: center; gap: 6px; }
        .blog-post { max-width: 720px; margin: 0 auto; }
        .blog-post-back { display: inline-flex; align-items: center; gap: 6px; color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; margin-bottom: 24px; }
        .blog-post-back:hover { color: var(--accent-primary); }
        .blog-post-header { margin-bottom: 28px; }
        .blog-post-header h1 { font-family: var(--font-display); font-size: 2rem; margin-bottom: 8px; }
        .blog-post-header .blog-card-meta { margin-bottom: 0; }
        .blog-post-content { font-size: 1rem; line-height: 1.8; color: var(--text-primary); }
        .blog-post-content h3 { font-family: var(--font-display); font-size: 1.2rem; margin: 24px 0 12px; color: var(--text-primary); }
        .blog-post-content p { margin-bottom: 16px; color: var(--text-secondary); }
        .blog-post-content ul { margin: 12px 0; padding-left: 24px; }
        .blog-post-content li { margin-bottom: 8px; color: var(--text-secondary); }
        .blog-post-content strong { color: var(--text-primary); }
        .blog-post-content code { background: var(--bg-hover); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
        .blog-post-content pre { background: var(--bg-hover); padding: 16px; border-radius: var(--radius-md); overflow-x: auto; margin: 16px 0; border: 1px solid var(--border-color); }
        .blog-post-content pre code { background: none; padding: 0; }
        .blog-post-content em { color: var(--accent-primary); }
        .blog-post-footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-color); text-align: center; }
        .blog-loading { text-align: center; padding: 80px 0; color: var(--text-muted); }
        .blog-error { text-align: center; padding: 80px 0; color: var(--text-muted); }
        @media (max-width: 768px) {
            .blog-header h1 { font-size: 1.8rem; }
            .blog-post-header h1 { font-size: 1.4rem; }
            .blog-listing, .blog-post { padding: 0 16px; }
        }
    </style>
</head>
<body>

        <div class="nav-container">
            <a href="." class="nav-logo">
                <div class="logo-diamond">
                    <svg viewBox="0 0 100 100" class="diamond-svg">
                        <defs>
                            <linearGradient id="blogTop" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#e0f8ff"/>
                                <stop offset="100%" stop-color="#22d3ee"/>
                            </linearGradient>
                            <linearGradient id="blogUL" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#93c5fd"/>
                                <stop offset="100%" stop-color="#3b82f6"/>
                            </linearGradient>
                            <linearGradient id="blogUR" x1="100%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#f9a8d4"/>
                                <stop offset="100%" stop-color="#d946ef"/>
                            </linearGradient>
                            <linearGradient id="blogML" x1="0%" y1="50%" x2="100%" y2="50%">
                                <stop offset="0%" stop-color="#4338ca"/>
                                <stop offset="100%" stop-color="#3730a3"/>
                            </linearGradient>
                            <linearGradient id="blogMR" x1="100%" y1="50%" x2="0%" y2="50%">
                                <stop offset="0%" stop-color="#be185d"/>

                            </linearGradient>
                            <linearGradient id="blogLL" x1="0%" y1="0%" x2="100%" y2="100%">

                                <stop offset="100%" stop-color="#2e1065"/>
                            </linearGradient>
                            <linearGradient id="blogLR" x1="100%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#881337"/>
                                <stop offset="100%" stop-color="#4c0519"/>
                            </linearGradient>
                        </defs>
                        <polygon points="50,3 90,50 50,97 10,50" fill="#0a0a1a" stroke="#22d3ee" stroke-width="1.5"/>
                        <polygon points="50,3 72,26 28,26" fill="url(#blogTop)" stroke="white" stroke-width="2" stroke-linejoin="round"/>
                        <polygon points="28,26 8,50 50,50" fill="url(#blogUL)" stroke="white" stroke-width="2" stroke-linejoin="round"/>
                        <polygon points="72,26 50,50 92,50" fill="url(#blogUR)" stroke="white" stroke-width="2" stroke-linejoin="round"/>
                        <polygon points="8,50 28,74 50,50" fill="url(#blogML)" stroke="white" stroke-width="2" stroke-linejoin="round"/>
                        <polygon points="92,50 50,50 72,74" fill="url(#blogMR)" stroke="white" stroke-width="2" stroke-linejoin="round"/>
                        <polygon points="28,74 50,97 50,50" fill="url(#blogLL)" stroke="white" stroke-width="2" stroke-linejoin="round"/>
                        <polygon points="72,74 50,50 50,97" fill="url(#blogLR)" stroke="white" stroke-width="2" stroke-linejoin="round"/>
                        <polygon points="50,3 66,22 50,30 34,22" fill="white" opacity="0.5"/>
                        <text x="50" y="59" text-anchor="middle" fill="white" font-family="'Space Grotesk', sans-serif" font-weight="800" font-size="22" letter-spacing="-0.5">MVR</text>
                    </svg>
                </div>
                <div class="logo-text-wrap">
                    <span class="logo-name">MVR</span>
                    <span class="logo-tagline">Blog</span>

            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="." class="nav-link" data-text="Portfolio">Portfolio</a></li>
                <li><a href="blog.html" class="nav-link active" data-text="Blog">Blog</a></li>
                <li><a href="resume" class="nav-link" data-text="Resume">Resume</a></li>

        <div class="container">

                <div class="footer-brand">
                    <a href="." class="footer-logo">
                        <div class="logo-diamond">
                            <svg viewBox="0 0 100 100" class="diamond-svg">
                                <polygon points="50,3 90,50 50,97 10,50" fill="#0a0a1a" stroke="#22d3ee" stroke-width="1.5"/>
                                <polygon points="50,3 72,26 28,26" fill="#e0f8ff" stroke="white" stroke-width="2"/>
                                <polygon points="28,26 8,50 50,50" fill="#93c5fd" stroke="white" stroke-width="2"/>
                                <polygon points="72,26 50,50 92,50" fill="#f9a8d4" stroke="white" stroke-width="2"/>
                                <polygon points="8,50 28,74 50,50" fill="#4338ca" stroke="white" stroke-width="2"/>
                                <polygon points="92,50 50,50 72,74" fill="#be185d" stroke="white" stroke-width="2"/>
                                <polygon points="28,74 50,97 50,50" fill="#4c1d95" stroke="white" stroke-width="2"/>
                                <polygon points="72,74 50,50 50,97" fill="#881337" stroke="white" stroke-width="2"/>
                                <polygon points="50,3 66,22 50,30 34,22" fill="white" opacity="0.5"/>
                                <text x="50" y="59" text-anchor="middle" fill="white" font-family="'Space Grotesk', sans-serif" font-weight="800" font-size="22">MVR</text>
                            </svg>
                        </div>
                        <div class="footer-logo-text">
                            <span class="footer-name">MVR</span>
                            <span class="footer-tagline">Strategy. Code. Results.</span>
                        </div>
                    </a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Vamshidhar Reddy M. Strategy. Code. Results.</p>
            </div>
        </div>
    </footer>

    <script>
        (function() {
            const t = localStorage.getItem('theme');
            if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
        })();
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const app = document.getElementById('blogApp');
            const themeToggle = document.getElementById('themeToggle');
            const icon = themeToggle.querySelector('i');

            if (document.documentElement.getAttribute('data-theme') === 'light') {
                icon.className = 'fas fa-sun';
            }

            themeToggle.addEventListener('click', function() {
                const html = document.documentElement;
                const isDark = html.getAttribute('data-theme') !== 'light';
                html.setAttribute('data-theme', isDark ? 'light' : 'dark');
                localStorage.setItem('theme', isDark ? 'light' : 'dark');
                icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            });

            function renderListing(posts) {
                app.innerHTML = '<div class="blog-header"><h1>Blog</h1><p>Thoughts on AI marketing, SEO, PPC, and digital strategy.</p></div><div class="blog-listing">' +
                    posts.map(p => '<div class="blog-card" onclick="window.location.hash=\'#/' + p.id + '\'">' +
                        '<div class="blog-card-meta"><span>' + p.date + '</span><span>' + p.readTime + '</span></div>' +
                        '<h2>' + p.title + '</h2>' +
                        '<p>' + p.description + '</p>' +
                        '<span class="read-more">Read more <i class="fas fa-arrow-right"></i></span>' +
                    '</div>').join('') +
                    '</div>';
            }

            function renderPost(posts, id) {
                const post = posts.find(p => p.id === id);
                if (!post) { renderListing(posts); return; }
                app.innerHTML = '<div class="blog-post">' +
                    '<a href="blog.html" class="blog-post-back" onclick="window.location.hash=\'\';return false;"><i class="fas fa-arrow-left"></i> Back to all posts</a>' +
                    '<div class="blog-post-header">' +
                        '<h1>' + post.title + '</h1>' +
                        '<div class="blog-card-meta"><span>' + post.date + '</span><span>' + post.readTime + '</span></div>' +
                    '</div>' +
                    '<div class="blog-post-content">' + post.content + '</div>' +
                    '<div class="blog-post-footer"><a href="blog.html" class="btn btn-secondary" onclick="window.location.hash=\'\';return false;"><i class="fas fa-arrow-left"></i> Back to all posts</a></div>' +
                '</div>';
            }

            function route() {
                app.innerHTML = '<div class="blog-loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
                fetch('blog.json?v=1.0').then(function(r) { return r.json(); }).then(function(posts) {
                    var hash = window.location.hash.replace('#/', '');
                    if (hash && hash !== '') {
                        renderPost(posts, hash);
                    } else {
                        renderListing(posts);
                    }
                }).catch(function() {
                    app.innerHTML = '<div class="blog-error">Could not load blog posts. <a href="." style="color:var(--accent-primary)">Back to portfolio</a></div>';
                });
            }

            window.addEventListener('hashchange', route);
            route();
        });
    </script>
</body>
</html>
