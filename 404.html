<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Vamshidhar Reddy M</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e1a; color: #e2e8f0;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; text-align: center; padding: 24px;
        }
        .container { max-width: 480px; }
        .logo-diamond { width: 80px; height: 80px; margin: 0 auto 32px; }
        .diamond-svg { width: 100%; height: 100%; }
        h1 { font-size: 5rem; font-weight: 800; background: linear-gradient(135deg, #06b6d4, #6366f1, #d946ef); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 8px; }
        h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 12px; color: #94a3b8; }
        p { color: #64748b; margin-bottom: 32px; font-size: 0.95rem; line-height: 1.6; }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 28px; border-radius: 12px; font-weight: 600;
            font-size: 0.95rem; text-decoration: none; transition: all 0.2s ease;
        }
        .btn-primary { background: linear-gradient(135deg, #06b6d4, #6366f1); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.3); }
        .btn-secondary { color: #94a3b8; }
        .btn-secondary:hover { color: #e2e8f0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-diamond">
            <svg viewBox="0 0 100 100" class="diamond-svg">
                <defs>
                    <linearGradient id="f1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#06b6d4"/><stop offset="50%" stop-color="#6366f1"/><stop offset="100%" stop-color="#d946ef"/>
                    </linearGradient>
                </defs>
                <polygon points="50,5 85,50 50,95 15,50" fill="url(#f1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
            </svg>
        </div>
        <h1>404</h1>
        <h2>Page not found</h2>
        <p>The page you're looking for doesn't exist or has been moved.<br>Let's get you back on track.</p>
        <a href="/portfolio/" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Back to Home</a>
        <a href="/portfolio/#contact" class="btn btn-secondary">Contact Me</a>
    </div>
</body>
</html>
